services:
  mfp-mcp:
    build: .
    environment:
      - MFP_USERNAME=${MFP_USERNAME}
      - MFP_PASSWORD=${MFP_PASSWORD}
      - TZ=America/New_York
    volumes:
      - ./mfp-cookies:/home/mcp/.mfp_mcp
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mfp-mcp
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http nginx:80 --url=${NGROK_DOMAIN} --basic-auth=${NGROK_BASIC_AUTH}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - nginx
    restart: unless-stopped
