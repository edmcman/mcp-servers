services:
  mfp-mcp:
    build: .
    environment:
      - MFP_USERNAME=${MFP_USERNAME}
      - MFP_PASSWORD=${MFP_PASSWORD}
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http mfp-mcp:8000 --domain=${NGROK_DOMAIN} --basic-auth=${NGROK_BASIC_AUTH}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - mfp-mcp
    restart: unless-stopped
