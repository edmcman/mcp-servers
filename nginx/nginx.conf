events {}

http {
  server {
    listen 80;

    location /mfp/ {
      rewrite ^/mfp/(.*) /$1 break;
      proxy_pass http://mfp-mcp:8000;

      proxy_buffering           off;
      proxy_cache               off;
      proxy_read_timeout        3600s;
      proxy_set_header          Connection '';
      proxy_http_version        1.1;
      chunked_transfer_encoding on;
      add_header                X-Accel-Buffering no;
    }
  }
}
